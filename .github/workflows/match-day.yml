name: Match Day (deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GCP_PROJECT: kickwise-prod
  GCP_REGION: europe-west3
  BUCKET: kickwise-euw3-bucket-striker
  WIF_PROVIDER: projects/264607219534/locations/global/workloadIdentityPools/kickwise-euw3-pool-github/providers/kickwise-euw3-prov-github
  DEPLOY_SA: kickwise-euw3-sa-gha-deploy@kickwise-prod.iam.gserviceaccount.com
  PLAYMAKER_URL: https://kickwise-euw3-run-playmaker-2zf6f7v3pq-ey.a.run.app

jobs:
  warmup-and-deploy:
    name: Warmup, Build & Match Day
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Build (with VITE_API_URL pointing at Playmaker)
        run: |
          export VITE_API_URL="${PLAYMAKER_URL}"
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync build/ to GCS bucket
        run: |
          gcloud storage rsync build/ "gs://${BUCKET}/" \
            --recursive \
            --delete-unmatched-destination-objects \
            --cache-control="no-cache, max-age=0" \
            --quiet

      - name: Set long cache for hashed assets
        run: |
          # SvelteKit emits hashed filenames under _app/immutable/ — those can
          # be cached aggressively. Everything else stays no-cache.
          gcloud storage objects update "gs://${BUCKET}/_app/immutable/**" \
            --cache-control="public, max-age=31536000, immutable" \
            --quiet || true

      - name: Show public URL
        run: |
          echo "Striker is live at: https://storage.googleapis.com/${BUCKET}/index.html"
