name: Match Day (deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GCP_PROJECT: kickwise-prod
  WIF_PROVIDER: projects/264607219534/locations/global/workloadIdentityPools/kickwise-euw3-pool-github/providers/kickwise-euw3-prov-github
  DEPLOY_SA: kickwise-euw3-sa-gha-deploy@kickwise-prod.iam.gserviceaccount.com
  PLAYMAKER_URL: https://kickwise-euw3-run-playmaker-2zf6f7v3pq-ey.a.run.app

jobs:
  deploy:
    name: Warmup, Build & Match Day
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Build (with VITE_API_URL pointing at Playmaker)
        run: |
          export VITE_API_URL="${PLAYMAKER_URL}"
          npm run build

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools@latest deploy \
            --only hosting \
            --project "${GCP_PROJECT}" \
            --non-interactive

      - name: Show public URL
        run: |
          SITE_ID=$(jq -r '.hosting.site' firebase.json)
          echo "Striker is live at: https://${SITE_ID}.web.app"
