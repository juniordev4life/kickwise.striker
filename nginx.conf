worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile         on;
  tcp_nopush       on;
  gzip             on;
  gzip_types       text/plain text/css application/json application/javascript
                   application/xml application/octet-stream image/svg+xml
                   font/woff font/woff2;
  gzip_min_length  1024;

  server {
    # Cloud Run injects PORT via env var; nginx-unprivileged listens on 8080
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a real file falls back to
    # index.html so SvelteKit can take over client-side routing.
    location / {
      try_files $uri $uri/ /index.html;

      # No cache on the HTML shell — we always want the freshest entry
      # so newly deployed asset hashes are discovered.
      add_header Cache-Control "no-cache, max-age=0";
    }

    # Hashed assets — safe to cache aggressively.
    location /_app/immutable/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cheap health endpoint for Cloud Run.
    location = /healthz {
      access_log off;
      add_header Content-Type application/json;
      return 200 '{"service":"striker","status":"ok"}';
    }
  }
}
