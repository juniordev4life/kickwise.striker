<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Kickwise — Bundesliga-Predictions und Kickbase-Optimierung." />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <title>Kickwise</title>
    <script>
      // GCS direct-bucket hosting serves the SPA at /<bucket>/index.html.
      // The trailing "index.html" is not a SvelteKit route, so we rewrite
      // it to "/" before the runtime boots. After that the SvelteKit
      // router takes over and navigates internally without page reloads.
      (function rewriteIndexHtml() {
        var p = window.location.pathname;
        if (p.endsWith("/index.html")) {
          var newPath = p.slice(0, -"index.html".length);
          window.history.replaceState(
            null,
            "",
            newPath + window.location.search + window.location.hash
          );
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-slate-50 text-slate-900 antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
